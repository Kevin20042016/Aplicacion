version: '3.8'

services:
  basededatos:
    image: postgres:15
    container_name: fitness_postgres
    environment:
      POSTGRES_DB: fitnessapp_db
      POSTGRES_USER: kevin
      POSTGRES_PASSWORD: password123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: